<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="../index.css" />
    <title>Cita Romantica</title>
</head>

<body>
    <div class="page-container">
        <div class="romantic-card">
            <span class="heart-decoration">❤️</span>
            <span class="heart-decoration">💕</span>
            <span class="heart-decoration">❤️</span>
            <span class="heart-decoration">💕</span>
            <h1 class="celebrate-text">ESOO!! BUENA ELECCION MI AMOR</h1>
            <p class="options-text">Ahora cuentas con 2 opciones:</p>
            <p class="question-text">¿Quieres que nuestra cita sea escogida por mi? O ¿Quieres escoger tu la cita?</p>
            <div class="button-group">
                <button id="btnElige" type="button" class="btn btn-romantic-primary">Elige por mi</button>
                <button id="btnEscoger" type="button" class="btn btn-romantic-secondary">Quiero escoger la cita</button>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Proxima Cita</h2>
            <p class="modal-subtitle">Selecciona el lugar para nuestra cita:</p>
            <div class="radio-group">
                <div class="form-check">
                    <input type="radio" class="form-check-input" id="chilis" name="lugar" value="chilis" />
                    <label class="form-check-label" for="chilis">Chilis</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" id="beso" name="lugar" value="beso" />
                    <label class="form-check-label" for="beso">Beso Frances</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" id="conamu" name="lugar" value="conamu" />
                    <label class="form-check-label" for="conamu">Conamu</label>
                </div>
                <div class="form-check">
                    <input type="radio" class="form-check-input" id="napoleon" name="lugar" value="napoleon" />
                    <label class="form-check-label" for="napoleon">Cafeteria Napoleon</label>
                </div>
            </div>
            <div class="date-info">
                <p>La cita sera el dia: 04/11/2026</p>
                <button id="btnCambiar" type="button" class="btn-change">Quiero Cambiarla</button>
                <div class="form-date">
                    <label for="fecha">Selecciona la fecha que quieres:</label>
                    <input type="date" id="fecha" name="fecha" />
                </div>
            </div>
            <div class="modal-actions">
                <button id="btnCerrarModal" type="button" class="btn btn-romantic-no" style="width:auto;padding:10px 25px;font-size:0.95rem">Cancelar</button>
                <button id="btnConfirmar" type="button" class="btn btn-romantic-yes" style="width:auto;padding:10px 25px;font-size:0.95rem">Confirmar Cita</button>
            </div>
        </div>
    </div>

    <script src="../index.js"></script>
</body>

</html>
