<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Cita Romantica</title>
  </head>

  <body>
    <div class="container">
      <div>
        <h1>ESOO!! BUENA ELECCION MI AMOR</h1>
        <p>ahora cuentas con 2 opciones:</p>
        <br />
        ¿Quieres que nuestra cita sea escogida por mi? O ¿Quieres escoger tu la
        cita?
        <button type="button" class="btn-primary">Elige por mi</button>
        <br />
        <button id="btnAbrir" type="button" class="btn-primary">
          Quiero escoger la cita
        </button>

        <div id="btnModal">
          <h2>Proxima Cita</h2>
          <p>Selecciona el lugar para nuestra cita:</p>
          <div class="form-check">
            <input type="radio" id="opcion1" name="lugar" value="opcion1" />
            <label for="opcion1">Chilis</label>

            <input type="radio" id="opcion2" name="lugar" value="opcion2" />
            <label for="opcion2">Beso Frances</label>

            <input type="radio" id="opcion3" name="lugar" value="opcion3" />
            <label for="opcion3">Conamu</label>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
